<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { DEFAULT: '#6d28d9', light: '#ede9fe', dark: '#4c1d95' },
        surface: '#f8f7fc',
      },
      fontFamily: { sans: ['Inter', 'Hiragino Sans', 'sans-serif'] }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK v9 (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  body { font-family: 'Inter', 'Hiragino Sans', sans-serif; }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 3px; }

  /* テーブル横スクロール */
  .table-wrap { overflow-x: auto; }

  /* フェードイン */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ステータスバッジ */
  .status-badge {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    padding: 2px 10px; border-radius: 100px;
  }
  .status-new      { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .status-contact  { background: #fefce8; color: #ca8a04; border: 1px solid #fde68a; }
  .status-entered  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

  /* セレクトボックス */
  select.status-select {
    font-size: 12px; padding: 3px 8px;
    border-radius: 6px; border: 1px solid #e5e7eb;
    background: white; cursor: pointer; outline: none;
  }
  select.status-select:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139,92,246,0.15); }

  /* カード */
  .user-card { transition: box-shadow 0.2s; }
  .user-card:hover { box-shadow: 0 4px 20px rgba(109,40,217,0.08); }

  /* トースト */
  #toast {
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
</style>
</head>
<body class="bg-surface min-h-screen text-gray-800">

<!-- ══════════════════════════════════════
     ログイン画面
══════════════════════════════════════ -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-violet-50 to-purple-100">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 fade-in">

    <!-- ロゴ -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-3">
        <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-sm">S</span>
        </div>
        <span class="font-bold text-xl text-gray-900">Stellar</span>
        <span class="text-xs bg-violet-100 text-violet-600 px-2 py-0.5 rounded font-medium">Admin</span>
      </div>
      <p class="text-sm text-gray-500">管理者ポータル</p>
    </div>

    <!-- フォーム -->
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">メールアドレス</label>
        <input id="loginEmail" type="email" placeholder="admin@stellar.jp"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">パスワード</label>
        <input id="loginPassword" type="password" placeholder="••••••••"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div id="loginError" class="hidden text-xs text-red-500 bg-red-50 border border-red-100 rounded-lg px-3 py-2"></div>
      <button onclick="doLogin()" id="loginBtn"
        class="w-full bg-brand text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-brand-dark transition active:scale-95">
        ログイン
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">Stellar 管理者専用 — 無断アクセス禁止</p>
  </div>
</div>

<!-- ══════════════════════════════════════
     ダッシュボード
══════════════════════════════════════ -->
<div id="dashboard" class="hidden min-h-screen flex flex-col">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 bg-brand rounded-md flex items-center justify-center flex-shrink-0">
          <span class="text-white font-bold text-xs">S</span>
        </div>
        <span class="font-semibold text-gray-800 hidden sm:block">Stellar Admin</span>
        <span class="text-xs bg-violet-100 text-violet-600 px-2 py-0.5 rounded font-medium">管理者</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="adminEmail" class="text-xs text-gray-400 hidden sm:block"></span>
        <button onclick="doLogout()"
          class="text-xs text-gray-500 hover:text-red-500 border border-gray-200 hover:border-red-200 px-3 py-1.5 rounded-lg transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">

    <!-- サマリーカード -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">総登録者</p>
        <p class="text-2xl font-bold text-gray-800" id="statTotal">—</p>
        <p class="text-xs text-gray-400 mt-1">名</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">未連絡</p>
        <p class="text-2xl font-bold text-blue-600" id="statNew">—</p>
        <p class="text-xs text-gray-400 mt-1">名</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">面接調整中</p>
        <p class="text-2xl font-bold text-yellow-500" id="statContact">—</p>
        <p class="text-xs text-gray-400 mt-1">名</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">入店済み</p>
        <p class="text-2xl font-bold text-green-600" id="statEntered">—</p>
        <p class="text-xs text-gray-400 mt-1">名</p>
      </div>
    </div>

    <!-- フィルターバー -->
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm px-4 py-3 mb-4 flex flex-wrap gap-3 items-center">

      <!-- 検索 -->
      <div class="relative flex-1 min-w-[160px]">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
        <input id="filterSearch" type="text" placeholder="ニックネームで検索"
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100 transition"
          oninput="applyFilters()">
      </div>

      <!-- 最低時給フィルター -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-500 whitespace-nowrap">最低時給</label>
        <select id="filterWage" onchange="applyFilters()"
          class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-violet-400 bg-white">
          <option value="">すべて</option>
          <option value="2000">¥2,000〜</option>
          <option value="2500">¥2,500〜</option>
          <option value="3000">¥3,000〜</option>
          <option value="3500">¥3,500〜</option>
          <option value="4000">¥4,000〜</option>
        </select>
      </div>

      <!-- ステータスフィルター -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-500 whitespace-nowrap">ステータス</label>
        <select id="filterStatus" onchange="applyFilters()"
          class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-violet-400 bg-white">
          <option value="">すべて</option>
          <option value="new">未連絡</option>
          <option value="contact">面接調整中</option>
          <option value="entered">入店済み</option>
        </select>
      </div>

      <!-- 経験フィルター -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-500 whitespace-nowrap">経験</label>
        <select id="filterExp" onchange="applyFilters()"
          class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-violet-400 bg-white">
          <option value="">すべて</option>
          <option value="未経験">未経験</option>
          <option value="経験あり（1年未満）">経験あり（1年未満）</option>
          <option value="経験あり（1年以上）">経験あり（1年以上）</option>
        </select>
      </div>

      <!-- リセット -->
      <button onclick="resetFilters()"
        class="text-xs text-gray-400 hover:text-gray-600 underline whitespace-nowrap">
        リセット
      </button>

      <!-- 件数 -->
      <span id="filterCount" class="ml-auto text-xs text-gray-400 whitespace-nowrap"></span>
    </div>

    <!-- ローディング -->
    <div id="loadingState" class="text-center py-20">
      <div class="inline-block w-8 h-8 border-2 border-violet-200 border-t-brand rounded-full animate-spin mb-3"></div>
      <p class="text-sm text-gray-400">データを読み込み中...</p>
    </div>

    <!-- エラー -->
    <div id="errorState" class="hidden text-center py-20">
      <p class="text-sm text-red-400">データの読み込みに失敗しました。</p>
      <button onclick="loadUsers()" class="mt-3 text-xs text-brand underline">再試行</button>
    </div>

    <!-- 空 -->
    <div id="emptyState" class="hidden text-center py-20">
      <p class="text-sm text-gray-400">登録者がいません。</p>
    </div>

    <!-- ══ テーブル（デスクトップ） ══ -->
    <div id="tableView" class="hidden fade-in">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm table-wrap">
        <table class="w-full text-sm min-w-[900px]">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">#</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">ニックネーム</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">年齢</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">最低時給</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">出勤</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">送り</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">経験</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">ブロック店舗</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">登録日</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">ステータス</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>
    </div>

    <!-- ══ カード（モバイル） ══ -->
    <div id="cardView" class="hidden fade-in space-y-3"></div>

  </main>
</div>

<!-- トースト通知 -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-4 py-2.5 rounded-lg shadow-lg opacity-0 translate-y-2 z-50">
  保存しました
</div>

<!-- 詳細モーダル -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center px-4" onclick="closeModal(event)">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[85vh] overflow-y-auto" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h3 class="font-semibold text-gray-800">ユーザー詳細</h3>
      <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
    </div>
    <div id="modalContent" class="px-6 py-4 space-y-3"></div>
  </div>
</div>

<script>
// ══════════════════════════════════
// Firebase Config（ここを本番の値に差し替え）
// ══════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAZmmtI-BCneCuO6urLjBbh-5tph0KxcTM",
  authDomain: "stellar-takamatsu.firebaseapp.com",
  projectId: "stellar-takamatsu",
  storageBucket: "stellar-takamatsu.firebasestorage.app",
  messagingSenderId: "664201750972",
  appId: "1:664201750972:web:f16e2d5c8fc3f8256e23b9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let allUsers    = [];   // 全データ
let filtered    = [];   // フィルター後
let statusCache = {};   // lineUserId → status（ローカルキャッシュ）

// ══════════════════════════════════
// AUTH
// ══════════════════════════════════
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('adminEmail').textContent = user.email;
    loadUsers();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
  }
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');

  errEl.classList.add('hidden');
  btn.textContent = 'ログイン中...';
  btn.disabled = true;

  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    errEl.textContent = 'メールアドレスまたはパスワードが正しくありません。';
    errEl.classList.remove('hidden');
  } finally {
    btn.textContent = 'ログイン';
    btn.disabled = false;
  }
}

async function doLogout() {
  if (!confirm('ログアウトしますか？')) return;
  await auth.signOut();
}

// ══════════════════════════════════
// DATA LOAD
// ══════════════════════════════════
async function loadUsers() {
  show('loadingState');
  hide('tableView'); hide('cardView'); hide('emptyState'); hide('errorState');

  try {
    const snap = await db.collection('users').orderBy('registeredAt', 'desc').get();
    allUsers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

    // ローカルステータス初期化（Firestoreのstatusフィールドを優先）
    allUsers.forEach(u => {
      statusCache[u.id] = u.adminStatus || 'new';
    });

    hide('loadingState');
    applyFilters();
    updateStats();

  } catch (e) {
    console.error(e);
    hide('loadingState');
    show('errorState');
  }
}

// ══════════════════════════════════
// FILTERS
// ══════════════════════════════════
function applyFilters() {
  const q      = document.getElementById('filterSearch').value.trim().toLowerCase();
  const wage   = parseInt(document.getElementById('filterWage').value) || 0;
  const status = document.getElementById('filterStatus').value;
  const exp    = document.getElementById('filterExp').value;

  filtered = allUsers.filter(u => {
    if (q && !(u.nickname || '').toLowerCase().includes(q)) return false;
    if (wage && (u.minWage || 0) < wage) return false;
    if (status && (statusCache[u.id] || 'new') !== status) return false;
    if (exp && u.exp !== exp) return false;
    return true;
  });

  document.getElementById('filterCount').textContent = `${filtered.length} 件`;
  renderTable();
  renderCards();
}

function resetFilters() {
  document.getElementById('filterSearch').value   = '';
  document.getElementById('filterWage').value     = '';
  document.getElementById('filterStatus').value   = '';
  document.getElementById('filterExp').value      = '';
  applyFilters();
}

// ══════════════════════════════════
// STATS
// ══════════════════════════════════
function updateStats() {
  const total   = allUsers.length;
  const newC    = allUsers.filter(u => (statusCache[u.id] || 'new') === 'new').length;
  const contact = allUsers.filter(u => statusCache[u.id] === 'contact').length;
  const entered = allUsers.filter(u => statusCache[u.id] === 'entered').length;

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statNew').textContent     = newC;
  document.getElementById('statContact').textContent = contact;
  document.getElementById('statEntered').textContent = entered;
}

// ══════════════════════════════════
// RENDER TABLE（デスクトップ）
// ══════════════════════════════════
function renderTable() {
  if (filtered.length === 0 && allUsers.length > 0) {
    hide('tableView'); hide('cardView'); show('emptyState'); return;
  }
  if (filtered.length === 0) { return; }

  hide('emptyState');

  // デスクトップのみ表示
  if (window.innerWidth >= 768) {
    show('tableView'); hide('cardView');
  } else {
    hide('tableView'); show('cardView');
  }

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map((u, i) => {
    const age     = calcAge(u.birth);
    const regDate = formatDate(u.registeredAt);
    const blocked = (u.blockedShopNames || []).join('、') || '—';
    const status  = statusCache[u.id] || 'new';

    return `
    <tr class="border-b border-gray-50 hover:bg-violet-50/40 transition cursor-pointer" onclick="openModal('${u.id}')">
      <td class="px-4 py-3 text-gray-400 text-xs">${i + 1}</td>
      <td class="px-4 py-3">
        <div class="font-medium text-gray-800">${esc(u.nickname || '—')}</div>
        <div class="text-xs text-gray-400">${u.lineDisplayName || ''}</div>
      </td>
      <td class="px-4 py-3 text-gray-600">${age !== null ? age + '歳' : '—'}</td>
      <td class="px-4 py-3 font-medium text-gray-800">
        ${u.minWage ? '¥' + u.minWage.toLocaleString() + '〜' : '—'}
      </td>
      <td class="px-4 py-3 text-gray-600 text-xs">${esc(u.workDays || '—')}</td>
      <td class="px-4 py-3 text-gray-600 text-xs">${esc(u.send || '—')}</td>
      <td class="px-4 py-3 text-gray-600 text-xs">${esc(u.exp || '—')}</td>
      <td class="px-4 py-3 text-gray-500 text-xs max-w-[140px] truncate" title="${esc(blocked)}">${esc(blocked)}</td>
      <td class="px-4 py-3 text-gray-400 text-xs whitespace-nowrap">${regDate}</td>
      <td class="px-4 py-3" onclick="event.stopPropagation()">
        ${statusSelect(u.id, status)}
      </td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════
// RENDER CARDS（モバイル）
// ══════════════════════════════════
function renderCards() {
  if (window.innerWidth >= 768) return;

  const container = document.getElementById('cardView');
  container.innerHTML = filtered.map(u => {
    const age    = calcAge(u.birth);
    const status = statusCache[u.id] || 'new';
    const statusLabel = { new: '未連絡', contact: '面接調整中', entered: '入店済み' }[status];
    const statusCls   = { new: 'status-new', contact: 'status-contact', entered: 'status-entered' }[status];
    const blocked = (u.blockedShopNames || []).join('、') || '—';

    return `
    <div class="user-card bg-white rounded-xl border border-gray-100 shadow-sm p-4 cursor-pointer" onclick="openModal('${u.id}')">
      <div class="flex items-start justify-between mb-3">
        <div>
          <div class="font-semibold text-gray-800">${esc(u.nickname || '—')}</div>
          <div class="text-xs text-gray-400">${age !== null ? age + '歳' : '年齢不明'}</div>
        </div>
        <span class="status-badge ${statusCls}">${statusLabel}</span>
      </div>
      <div class="grid grid-cols-2 gap-2 text-xs mb-3">
        <div><span class="text-gray-400">最低時給</span><br><span class="font-medium text-gray-700">${u.minWage ? '¥'+u.minWage.toLocaleString()+'〜' : '—'}</span></div>
        <div><span class="text-gray-400">出勤日数</span><br><span class="font-medium text-gray-700">${esc(u.workDays||'—')}</span></div>
        <div><span class="text-gray-400">送り</span><br><span class="font-medium text-gray-700">${esc(u.send||'—')}</span></div>
        <div><span class="text-gray-400">経験</span><br><span class="font-medium text-gray-700">${esc(u.exp||'—')}</span></div>
      </div>
      ${blocked !== '—' ? `<div class="text-xs text-red-400 bg-red-50 rounded px-2 py-1 mb-3">🛡 ブロック: ${esc(blocked)}</div>` : ''}
      <div onclick="event.stopPropagation()" class="flex items-center gap-2">
        <span class="text-xs text-gray-400">ステータス変更:</span>
        ${statusSelect(u.id, status)}
      </div>
    </div>`;
  }).join('');
}

// ステータスセレクトボックス
function statusSelect(userId, current) {
  const opts = [
    { val: 'new',     label: '未連絡' },
    { val: 'contact', label: '面接調整中' },
    { val: 'entered', label: '入店済み' },
  ];
  return `<select class="status-select" onchange="updateStatus('${userId}', this.value)">
    ${opts.map(o => `<option value="${o.val}" ${current===o.val?'selected':''}>${o.label}</option>`).join('')}
  </select>`;
}

// ══════════════════════════════════
// ステータス更新
// ══════════════════════════════════
async function updateStatus(userId, newStatus) {
  statusCache[userId] = newStatus;
  updateStats();

  try {
    await db.collection('users').doc(userId).update({
      adminStatus: newStatus,
      adminStatusUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('ステータスを保存しました');
  } catch (e) {
    console.error('ステータス保存失敗:', e);
    showToast('⚠️ 保存に失敗しました（オフライン？）');
  }
}

// ══════════════════════════════════
// 詳細モーダル
// ══════════════════════════════════
function openModal(userId) {
  const u = allUsers.find(x => x.id === userId);
  if (!u) return;

  const age     = calcAge(u.birth);
  const regDate = formatDate(u.registeredAt);
  const blocked = (u.blockedShopNames || []);
  const aura    = (u.aura || []).join('、') || '—';
  const jobTypes= (u.jobTypes || []).join('、') || '—';

  const row = (label, value) => `
    <div class="flex gap-3 py-2 border-b border-gray-50 last:border-0">
      <span class="text-xs text-gray-400 w-28 flex-shrink-0 pt-0.5">${label}</span>
      <span class="text-sm text-gray-700 font-medium">${value}</span>
    </div>`;

  document.getElementById('modalContent').innerHTML = `
    ${row('LINE表示名', esc(u.lineDisplayName || '—'))}
    ${row('ニックネーム', esc(u.nickname || '—'))}
    ${row('年齢', age !== null ? age + '歳' : '—')}
    ${row('身長', u.height ? u.height + 'cm' : '—')}
    ${row('体型', esc(u.bodyType || '—'))}
    ${row('雰囲気', aura)}
    ${row('夜職経験', esc(u.exp || '—'))}
    ${row('最低希望時給', u.minWage ? '¥' + u.minWage.toLocaleString() + '〜' : '—')}
    ${row('出勤日数', esc(u.workDays || '—'))}
    ${row('送り', esc(u.send || '—'))}
    ${row('希望業態', jobTypes)}
    ${row('ブロック店舗', blocked.length ? blocked.map(b=>`<span class="bg-red-50 text-red-400 text-xs px-2 py-0.5 rounded mr-1">${esc(b)}</span>`).join('') : '—')}
    ${row('登録日', regDate)}
    <div class="pt-3">
      <p class="text-xs text-gray-400 mb-2">LINE ID（内部管理用）</p>
      <code class="text-xs bg-gray-50 border border-gray-100 rounded px-3 py-2 block text-gray-500 break-all">${esc(u.lineUserId || u.id)}</code>
    </div>
  `;

  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.add('hidden');
  }
}

// ══════════════════════════════════
// HELPERS
// ══════════════════════════════════
function calcAge(birth) {
  if (!birth || !birth.year) return null;
  const today = new Date();
  const bDate = new Date(birth.year, (birth.month||1)-1, birth.day||1);
  let age = today.getFullYear() - bDate.getFullYear();
  if (today < new Date(today.getFullYear(), bDate.getMonth(), bDate.getDate())) age--;
  return age;
}

function formatDate(ts) {
  if (!ts) return '—';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.getFullYear() + '/' +
      String(d.getMonth()+1).padStart(2,'0') + '/' +
      String(d.getDate()).padStart(2,'0');
  } catch { return '—'; }
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(8px)';
  }, 2500);
}

// レスポンシブ対応：リサイズ時に表示切替
window.addEventListener('resize', () => {
  if (filtered.length === 0) return;
  if (window.innerWidth >= 768) { show('tableView'); hide('cardView'); }
  else { hide('tableView'); show('cardView'); renderCards(); }
});
